<!--
  ProtoConsent logo concept B — slider tracks (clean, no text)
  Six sliders with background tracks and filled segments.
  CC BY-SA 4.0 — ProtoConsent contributors
-->
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="51" ry="51" fill="#dbeafe"/>

  <g>
    <!-- Slider 1: ~80% -->
    <rect x="32" y="20" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="20" width="154" height="16" rx="8" fill="#1e3a8a" />

    <!-- Slider 2: ~40% -->
    <rect x="32" y="60" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="60" width="77" height="16" rx="8" fill="#1e3a8a" />

    <!-- Slider 3: ~95% -->
    <rect x="32" y="100" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="100" width="182" height="16" rx="8" fill="#1e3a8a" />

    <!-- Slider 4: ~25% -->
    <rect x="32" y="140" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="140" width="48" height="16" rx="8" fill="#1e3a8a" />

    <!-- Slider 5: ~60% -->
    <rect x="32" y="180" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="180" width="115" height="16" rx="8" fill="#1e3a8a" />

    <!-- Slider 6: ~10% -->
    <rect x="32" y="220" width="192" height="16" rx="8" fill="#bfdbfe" />
    <rect x="32" y="220" width="29" height="16" rx="8" fill="#1e3a8a" />
  </g>
</svg>
